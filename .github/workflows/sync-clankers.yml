name: Sync Clankers from Sibling Repos

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: sync-clankers
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge clankers from all sources
        uses: actions/github-script@v7
        env:
          SIBLING_REPOS: ${{ vars.SIBLING_REPOS }}
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');

            execSync('git pull --rebase origin main', { stdio: 'inherit' });

            const jsonFile = 'clankers.json';
            const mdFile = 'clankers.md';
            const localFile = 'clankers-local.json';

            // ── Step 1: Load local data ──
            let localData = [];
            if (fs.existsSync(localFile)) {
              try {
                const parsed = JSON.parse(fs.readFileSync(localFile, 'utf8'));
                if (!Array.isArray(parsed)) throw new Error('not an array');
                localData = parsed;
              } catch (e) {
                console.log(`ABORT: ${localFile} corrupted: ${e.message}`);
                return;
              }
            } else if (fs.existsSync(jsonFile)) {
              // clankers-local.json missing but clankers.json exists = file was deleted
              console.log(`ABORT: ${localFile} missing but ${jsonFile} exists. Local data may have been lost.`);
              console.log('Restore from backup or re-seed: cp clankers.json clankers-local.json');
              return;
            }

            // ── Step 2: Fetch siblings ──
            const repos = (process.env.SIBLING_REPOS || '')
              .split(',')
              .map(r => r.trim())
              .filter(Boolean);

            const sources = new Map();
            sources.set('__local__', localData);

            let fetchedCount = 0;
            for (const repo of repos) {
              const [owner, name] = repo.split('/');
              if (!owner || !name) {
                console.log(`SKIP bad format: "${repo}"`);
                continue;
              }
              try {
                const url = `https://raw.githubusercontent.com/${owner}/${name}/main/clankers.json`;
                const resp = await fetch(url);
                if (!resp.ok) {
                  console.log(`SKIP ${repo}: HTTP ${resp.status}`);
                  continue;
                }
                const remote = await resp.json();
                if (!Array.isArray(remote)) {
                  console.log(`SKIP ${repo}: not an array`);
                  continue;
                }
                sources.set(repo, remote);
                console.log(`OK ${repo}: ${remote.length} entries`);
                fetchedCount++;
              } catch (e) {
                console.log(`FAIL ${repo}: ${e.message}`);
              }
            }

            // ── Step 3: Merge all sources ──
            const merged = new Map();

            for (const [source, entries] of sources) {
              for (const entry of entries) {
                if (!entry.username || typeof entry.total_prs !== 'number') continue;
                if (entry.total_prs < 0) continue;

                const existing = merged.get(entry.username);
                if (existing) {
                  existing.total_prs += entry.total_prs;
                  if (entry.first_pr && entry.first_pr < existing.first_pr) {
                    existing.first_pr = entry.first_pr;
                  }
                  if (entry.last_pr && entry.last_pr > existing.last_pr) {
                    existing.last_pr = entry.last_pr;
                  }
                } else {
                  merged.set(entry.username, {
                    username: entry.username,
                    total_prs: entry.total_prs,
                    first_pr: entry.first_pr || new Date().toISOString(),
                    last_pr: entry.last_pr || new Date().toISOString(),
                  });
                }
              }
            }

            const result = Array.from(merged.values()).sort((a, b) => b.total_prs - a.total_prs);

            if (result.length === 0) {
              console.log('No data to write');
              return;
            }

            // ── Step 4: Safety check ──
            let currentCount = 0;
            if (fs.existsSync(jsonFile)) {
              try {
                const current = JSON.parse(fs.readFileSync(jsonFile, 'utf8'));
                if (Array.isArray(current)) currentCount = current.length;
              } catch (e) {}
            }

            if (result.length < currentCount * 0.5 && currentCount > 10) {
              console.log(`ABORT: merged ${result.length} but current has ${currentCount}. Possible data loss.`);
              return;
            }

            // ── Step 5: Write JSON + MD ──
            fs.writeFileSync(jsonFile, JSON.stringify(result, null, 2) + '\n');

            let md = '# Clankers\n\n';
            md += 'Automated tracking of all Clankers PR contributors.\n\n';
            md += '| Username | Total PRs | First PR | Last PR |\n';
            md += '|----------|-----------|----------|----------|\n';
            for (const row of result) {
              md += `| ${row.username} | ${row.total_prs} | ${row.first_pr} | ${row.last_pr} |\n`;
            }
            fs.writeFileSync(mdFile, md);

            // ── Step 6: Commit if changed ──
            const diff = execSync('git diff --quiet clankers.md clankers.json || echo changed').toString().trim();
            if (diff !== 'changed') {
              console.log('No changes after merge');
              return;
            }

            execSync('git config user.name "github-actions[bot]"');
            execSync('git config user.email "github-actions[bot]@users.noreply.github.com"');
            execSync('git add clankers.md clankers.json');
            execSync(`git commit -m "clankers database: sync from ${sources.size} source(s)"`);
            execSync('git pull --rebase origin main', { stdio: 'inherit' });
            execSync('git push', { stdio: 'inherit' });
            console.log(`Done: ${result.length} clankers from ${sources.size} sources`);
